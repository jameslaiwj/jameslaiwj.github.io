<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>James Lai | Data Analyst</title>
  <style>
    /* Reset - removes browser default ugly spacing */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Base body styling */
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #0a0a0a;
      color: #f0f0f0;
      line-height: 1.6;
    }

    /* Navigation Bar */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 3rem;
      background-color: #111;
      position: sticky;
      top: 0;
    }

    nav a {
    color: #f0f0f0;
    text-decoration: none;
    font-weight: bold;
    font-size: 1.1rem;
  }

  nav ul {
    list-style: none;
    display: flex;
    gap: 2rem;
  }

  nav ul a {
    font-weight: normal;
    font-size: 0.9rem;
    color: #aaa;
  }

  nav ul a:hover {
    color: #f0f0f0;
  }

  /* Sections */
  section {
    padding: 5rem 3rem;
    max-width: 900px;
    margin: 0 auto;
  }

  h1 {
    font-size: 3rem;
    margin-bottom: 1rem;
  }

  h2 {
    font-size: 1.8rem;
    margin-bottom: 1.5rem;
    color: #d0271d;
  }

  p {
    color: #bbb;
    margin-bottom: 0.8rem;
  }

  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a href="#home">James Lai</a>
    <ul>
      <li><a href="#home">Home</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <section id="home">
    <h1>James Lai</h1>

    <p>Data Analyst | Python • Tableau • SQL</p>
  </section>
