<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>James Lai | Data Analyst</title>

  <!-- CSS -->
  <style>
    /* Reset - removes browser default ugly spacing */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Base body styling */
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #0a0a0a;
      color: #f0f0f0;
      line-height: 1.6;
    }

    /* Navigation Bar */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 3rem;
      background-color: #111;
      position: sticky;
      top: 0;
    }

    nav a {
    color: #f0f0f0;
    text-decoration: none;
    font-weight: bold;
    font-size: 1.1rem;
  }

  nav ul {
    list-style: none;
    display: flex;
    gap: 2rem;
  }

  nav ul a {
    font-weight: normal;
    font-size: 0.9rem;
    color: #aaa;
  }

  nav ul a:hover {
    color: #f0f0f0;
  }

  /* Sections */
  section {
    padding: 5rem 3rem;
    max-width: 900px;
    margin: 0 auto;
  }

  h1 {
    font-size: 3rem;
    margin-bottom: 1rem;
  }

  h2 {
    font-size: 1.8rem;
    margin-bottom: 1.5rem;
    color: #d0271d;
  }

  p {
    color: #bbb;
    margin-bottom: 0.8rem;
  }

  //* Home hero section */
  #home {
    min-height: 90vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .eyebrow {
    font-size: 1rem;
    color: #aaa;
    margin-bottom: 0.5rem;
  }

  .tagline {
    font-size: 1.3rem;
    color: #d0271d;
    font-style: italic;
    margin-top: 0.5rem;
  }

  .subtitle {
    font-size: 0.95rem;
    color: #888;
    margin-top: 0.3rem;
  }

  /* Buttons */
  .hero-buttons {
    display: flex;
    gap: 1rem;
    margin-top: 2rem;
  }

  .btn-primary {
    background-color: #d0271d;
    color: white;
    padding: 0.7rem 1.8rem;
    border-radius: 4px;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: bold;
  }

  .btn-primary:hover {
    background-color: #a01e16;
  }

  .btn-secondary {
    border: 1px solid #555;
    color: #ccc;
    padding: 0.7rem 1.8rem;
    border-radius: 4px;
    text-decoration: none;
    font-size: 0.9rem;
  }

  .btn-secondary:hover {
    border-color: #aaa;
    color: white;
  }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a href="#home">James Lai</a>
    <ul>
      <li><a href="#home">Home</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- HOME -->
  <section id="home">
    <p class="eyebrow">Hi, I'm
    <h1>James Lai</h1>
    <p class="tagline">From Ammunition to Analytics, Driven by Curiousity</p>
    <p class="subtitle">Data Analyst | Python • Tableau • SQL | Ex-SAF | Open to Work</p>
    <div class="hero-buttons">
      <a href="#projects" class="btn-primary">View My Work</a>
      <a href="#contact" class="btn-secondary">Get In Touch</a>
    </div>
  </section>

  <!-- PROJECTS -->
  <section id="projects">
    <h2>Projects</h2>
    <p>Coming soon!</p>
  </section>

  <!-- ABOUT -->
  <section id="about">
    <h2>About</h2>
    <p>Coming soon!</p>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <h2>Contact</h2>
    <p>Coming soon!</p>
  </section>
  
</body>
</html>
